events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zones ───────────────────────────────
    # General: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Login: 1 request/second per IP (strict brute force protection)
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    # API: 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # ── Hide server version ───────────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────
    log_format security '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time';

    access_log /var/log/nginx/access.log security;
    error_log  /var/log/nginx/error.log warn;

    upstream flask_app {
        server app:5000;
    }

    server {
        listen 80;
        server_name _;

        # ── Global security headers ───────────────────────
        add_header X-Content-Type-Options    "nosniff"          always;
        add_header X-Frame-Options           "DENY"             always;
        add_header X-XSS-Protection          "1; mode=block"    always;
        add_header Referrer-Policy           "no-referrer"      always;
        add_header Permissions-Policy        "geolocation=()"   always;

        # ── Block bad bots and scanners ───────────────────
        if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab|gobuster|dirb)) {
            return 403;
        }

        # ── Block common attack paths ─────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 404;
        }

        location ~* /(wp-admin|phpmyadmin|\.env|\.git|config\.php) {
            return 404;
        }

        # ── Login endpoint — strict rate limit ────────────
        location /login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── API endpoints ─────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Metrics — internal only ───────────────────────
        location /metrics {
            # In production: restrict to monitoring network only
            # allow 172.16.0.0/12;
            # deny all;
            proxy_pass http://flask_app/metrics;
        }

        # ── Main app ──────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout                 60s;
        }

        # ── Custom error pages ────────────────────────────
        error_page 429 /rate_limited.html;
        error_page 403 /forbidden.html;

        location = /rate_limited.html {
            return 429 '{"error": "Too many requests. Slow down."}';
            add_header Content-Type application/json;
        }

        location = /forbidden.html {
            return 403 '{"error": "Access denied. Your IP has been flagged."}';
            add_header Content-Type application/json;
        }
    }
}
